<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Preview</title>
  <link rel="stylesheet" href="/assets/styles/styles.css">
  <link rel="stylesheet" href="/assets/icons/style.css">
  <script type="importmap">
  {
    "imports": {
      "switch-framework": "/switch-framework/index.js",
      "switch-framework/router": "/switch-framework/router/index.js"
    }
  }
  </script>
  <style>
    body {
      margin: 0;
      padding: 16px;
      min-height: 100vh;
      background: var(--page_background, #fff);
    }
    #preview-root {
      width: 100%;
      min-height: calc(100vh - 32px);
    }
    .preview-error {
      color: #ef4444;
      font-size: 12px;
      white-space: pre-wrap;
      padding: 16px;
    }
  </style>
</head>
<body>
  <div id="preview-root"></div>
  <script type="module">
    import {
      loadGlobalIconSheetForPreview,
      mountPreviewComponent,
      readPreviewCodeFromHash,
    } from '/utils/livePreview.js';

    const _log = console.log;
    console.log = function(...args) {
      const msg = args.map((a) => (typeof a === 'object' ? JSON.stringify(a) : String(a))).join(' ');
      try { window.parent?.postMessage?.({ type: 'live-preview-log', payload: msg }, '*'); } catch (_) {}
      _log.apply(console, args);
    };

    await loadGlobalIconSheetForPreview();

    const code = readPreviewCodeFromHash();
    await mountPreviewComponent(code);
  </script>
</body>
</html>
